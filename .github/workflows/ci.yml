name: Fibonacci CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      number:
        description: "Number of Fibonacci terms to generate"
        required: false
        default: "0"

jobs:
  build-and-test:
    name: Build, Test and Run Fibonacci
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run unit tests
        run: pytest tests/ -v

      - name: Run Fibonacci app (default = 0) 
        run: python fibonacci.py

      - name: Run Fibonacci app with input number
        run: python fibonacci.py ${{ github.event.inputs.number || '7' }}

      - name: Show output in job summary
        run: |
          echo "## Fibonacci Pipeline Output" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          python fibonacci.py ${{ github.event.inputs.number || '7' }} >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
